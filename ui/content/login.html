---
title: "Login"
---
<nav class="navbar bg-base-100/80 backdrop-blur-md sticky top-0 z-50 shadow-sm px-4 lg:px-8">
    <div class="flex-1">
        <a href="/" class="text-2xl tracking-tighter flex items-center gap-0">
            <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 300 200" height="20px" class="mx-2">
              <path fill="#b400ff" d="M100 0h100v100H100z"/>
              <path fill="#7800ff" d="M200 0h100v100H200z"/>
              <path fill="#f0f" d="M100 100h100v100H100z"/>
              <path fill="#ff0078" d="M0 100h100v100H0z"/>
            </svg>
            <span class="text-primary font-black">snegs</span>
            <span class="text-base-content font-black">.</span>
        </a>
    </div>
    <div class="flex-none gap-4">
        <a href="/" class="btn btn-ghost rounded-full px-6 text-sm">Back to Home</a>
    </div>
</nav>

<main class="flex-grow flex items-center justify-center px-4 py-16 bg-gradient-to-br from-base-200 via-primary/15 to-secondary/20">
    <div class="card w-full max-w-md bg-base-100 shadow-2xl border border-base-300 transition-all duration-200">
        <div class="card-body p-8 sm:p-10">
            
            <div class="text-center mb-6">
                <h2 class="text-3xl font-extrabold tracking-tight mb-1">Welcome Back</h2>
                <p class="text-sm text-base-content/60">Access your dashboard</p>
            </div>

            <form id="login-form" class="space-y-4">
                
                <!-- Email Field -->
                <div class="form-control w-full">
                    <label class="label pb-1.5">
                        <span class="label-text font-semibold text-xs uppercase tracking-wider opacity-70">Email Address</span>
                    </label>
                    <div class="relative flex items-center">
                        <!-- Added z-10 here -->
                        <i data-lucide="mail" class="absolute left-4 z-10 w-5 h-5 text-base-content/40 pointer-events-none"></i>
                        <input 
                            type="email" 
                            id="login-email"
                            placeholder="name@yourbrand.com" 
                            class="input input-bordered w-full pl-12 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50" 
                            required 
                        />
                    </div>
                </div>

                <div class="form-control w-full">
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="label p-0">
                            <span class="label-text font-semibold text-xs uppercase tracking-wider opacity-70">Password</span>
                        </label>
                        <a href="#" class="text-xs link link-hover text-primary font-medium">Forgot password?</a>
                    </div>
                    <div class="relative flex items-center">
                        <!-- Added z-10 here -->
                        <i data-lucide="lock" class="absolute left-4 z-10 w-5 h-5 text-base-content/40 pointer-events-none"></i>
                        <input 
                            type="password" 
                            id="login-password"
                            placeholder="••••••••" 
                            class="input input-bordered w-full pl-12 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50" 
                            required 
                        />
                    </div>
                </div>

                <div class="form-control pt-4">
                    <button type="submit" class="btn btn-primary shadow-lg rounded-xl w-full text-base">
                        Sign In to Portal
                        <i data-lucide="arrow-right" class="w-4 h-4 ml-1"></i>
                    </button>
                </div>
            </form>

            <div class="divider text-xs text-base-content/40 font-semibold tracking-widest my-6">OR ENTER WITH</div>

            <div class="grid grid-cols-2 gap-3">
                <button class="btn bg-white text-black border-[#e5e5e5]">
                    <svg aria-label="Google logo" width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><g><path d="m0 0H512V512H0" fill="#fff"></path><path fill="#34a853" d="M153 292c30 82 118 95 171 60h62v48A192 192 0 0190 341"></path><path fill="#4285f4" d="m386 400a140 175 0 0053-179H260v74h102q-7 37-38 57"></path><path fill="#fbbc02" d="m90 341a208 200 0 010-171l63 49q-12 37 0 73"></path><path fill="#ea4335" d="m153 219c22-69 116-109 179-50l55-54c-78-75-230-72-297 55"></path></g></svg>
                    Google
                </button>
                <button class="btn bg-[#1A77F2] text-white border-[#005fd8]">
                    <svg aria-label="Facebook logo" width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path fill="white" d="M8 12h5V8c0-6 4-7 11-6v5c-4 0-5 0-5 3v2h5l-1 6h-4v12h-6V18H8z"></path></svg>
                    Facebook
                </button>
            </div>

            <p class="text-xs text-center text-base-content/50 mt-8">
                Don't have an account? <a href="/#waitlist" class="link link-primary font-semibold">Request Platform Access</a>
            </p>

        </div>
    </div>
</main>

<footer class="footer footer-center p-10 bg-base-200 text-base-content rounded mt-auto border-t border-base-300">
    <aside>
        <div class="text-2xl font-black text-primary mb-2 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 300 200" height="20px" class="mx-2" style="display:inline;">
                <path fill="#b400ff" d="M100 0h100v100H100z"/>
                <path fill="#7800ff" d="M200 0h100v100H200z"/>
                <path fill="#f0f" d="M100 100h100v100H100z"/>
                <path fill="#ff0078" d="M0 100h100v100H0z"/>
            </svg>
            <span class="tracking-tighter">snegs</span>
            <span class="text-base-content">.</span>
        </div>
        <p class="font-medium">The Ultimate E-commerce & Marketplace Engine.</p>
        <p class="text-sm mt-2 opacity-60">Copyright © 2026 - All rights reserved.</p>
    </aside>
</footer>
